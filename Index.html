<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR — Monthly Reels for Brands</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8f135;
    --muted: #a0a08a;
    --card: #141414;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* Logo / Brand */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 12px;
    animation: fadeUp 0.6s ease both;
  }

  .brand-logo {
    width: 220px;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 0 24px rgba(200,170,80,0.3));
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 0;
    width: 100%;
    margin-bottom: 32px;
    border: 1px solid #222;
    border-radius: 12px;
    overflow: hidden;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .stat {
    flex: 1;
    padding: 14px 10px;
    text-align: center;
    background: var(--card);
    border-right: 1px solid #222;
  }

  .stat:last-child { border-right: none; }

  .stat-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .stat-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 2px;
  }

  /* CTA Buttons */
  .cta-primary {
    width: 100%;
    padding: 18px 24px;
    background: var(--accent);
    color: var(--black);
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 3px;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    display: block;
    margin-bottom: 12px;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    animation: fadeUp 0.6s 0.2s ease both;
    box-shadow: 0 0 0 0 rgba(200,241,53,0);
  }

  .cta-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(200,241,53,0.25);
  }

  .cta-primary:active { transform: translateY(0); }

  /* Link cards */
  .link-card {
    width: 100%;
    padding: 16px 20px;
    background: var(--card);
    border: 1px solid #222;
    border-radius: 10px;
    text-decoration: none;
    color: var(--white);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    transition: border-color 0.2s ease, transform 0.15s ease;
    animation: fadeUp 0.6s ease both;
  }

  .link-card:hover {
    border-color: var(--accent);
    transform: translateX(4px);
  }

  .link-card:nth-child(1) { animation-delay: 0.3s; }
  .link-card:nth-child(2) { animation-delay: 0.35s; }
  .link-card:nth-child(3) { animation-delay: 0.4s; }
  .link-card:nth-child(4) { animation-delay: 0.45s; }

  .link-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .link-icon {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    background: #1e1e1e;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .link-title {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  .link-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .link-arrow {
    color: var(--muted);
    font-size: 18px;
    transition: color 0.2s ease, transform 0.2s ease;
  }

  .link-card:hover .link-arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  /* Section divider */
  .divider {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0 16px;
    animation: fadeUp 0.6s 0.5s ease both;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: #222;
  }

  .divider-text {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* What's included card */
  .offer-card {
    width: 100%;
    background: var(--card);
    border: 1px solid #222;
    border-radius: 12px;
    padding: 22px 20px;
    margin-bottom: 10px;
    animation: fadeUp 0.6s 0.55s ease both;
  }

  .offer-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--accent);
    margin-bottom: 14px;
  }

  .offer-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    border-bottom: 1px solid #1c1c1c;
    font-size: 13px;
    color: #ccc;
    font-weight: 300;
  }

  .offer-item:last-child { border-bottom: none; }

  .offer-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  /* Footer */
  .footer {
    margin-top: 36px;
    text-align: center;
    animation: fadeUp 0.6s 0.7s ease both;
  }

  .footer-brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 5px;
    color: #333;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
